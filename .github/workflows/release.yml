name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.1.0"
        required: true
        type: string
      upstream_ref:
        description: "Upstream perspective-cuts git ref to build"
        required: false
        default: "fdfadd8d5fc065114f4350f26e28f4443ddb7932"
        type: string

permissions:
  contents: write

env:
  UPSTREAM_REPO: "https://github.com/taylorarndt/perspective-cuts.git"
  UPSTREAM_REF: "fdfadd8d5fc065114f4350f26e28f4443ddb7932"

jobs:
  build:
    name: Build ${{ matrix.asset_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_arch: x64
          - runner: macos-15
            asset_arch: arm64

    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            upstream_ref="${{ inputs.upstream_ref }}"
          else
            version="${GITHUB_REF_NAME#v}"
            upstream_ref="${UPSTREAM_REF}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like 0.1.0 or 0.1.0-rc.1" >&2
            exit 1
          fi

          if [[ -z "${upstream_ref}" ]]; then
            echo "upstream_ref must not be empty" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "upstream_ref=${upstream_ref}" >> "${GITHUB_OUTPUT}"

      - name: Clone upstream source
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none "${UPSTREAM_REPO}" source
          git -C source checkout --detach "${{ steps.release.outputs.upstream_ref }}"
          git -C source rev-parse HEAD

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          swift build --package-path source -c release

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          asset="perspective-cuts-${version}-macos-${{ matrix.asset_arch }}"
          dist="${PWD}/dist/${asset}"

          mkdir -p "${dist}/bin" "${dist}/share/doc/perspective-cuts"
          cp "source/.build/release/perspective-cuts" "${dist}/bin/perspective-cuts"
          cp source/LICENSE "${dist}/share/doc/perspective-cuts/LICENSE"
          cp source/README.md "${dist}/share/doc/perspective-cuts/README.md"
          chmod 0755 "${dist}/bin/perspective-cuts"

          tar -czf "${asset}.tar.gz" -C "${dist}" .
          shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: perspective-cuts-macos-${{ matrix.asset_arch }}
          path: |
            perspective-cuts-*.tar.gz
            perspective-cuts-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums file
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          cat ./*.tar.gz.sha256 > checksums.txt
          rm ./*.tar.gz.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          title="perspective-cuts ${{ steps.release.outputs.version }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" artifacts/* --clobber
          else
            gh release create "${tag}" artifacts/* \
              --title "${title}" \
              --notes "Build-only release for taylorarndt/perspective-cuts."
          fi
