name: Release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream release tag to build. Leave empty to use the latest upstream release."
        required: false
        type: string
      force_release:
        description: "Rebuild and replace assets even if this release already exists."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: "taylorarndt/perspective-cuts"
  UPSTREAM_GIT_URL: "https://github.com/taylorarndt/perspective-cuts.git"

jobs:
  plan:
    name: Check upstream release
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.plan.outputs.should_build }}
      upstream_tag: ${{ steps.plan.outputs.upstream_tag }}
      version: ${{ steps.plan.outputs.version }}
      upstream_url: ${{ steps.plan.outputs.upstream_url }}

    steps:
      - name: Resolve upstream release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REQUESTED_UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          FORCE_RELEASE: ${{ inputs.force_release }}
        shell: bash
        run: |
          set -euo pipefail

          requested_tag="${REQUESTED_UPSTREAM_TAG}"
          if [[ -n "${requested_tag}" ]]; then
            upstream_json="$(gh release view "${requested_tag}" --repo "${UPSTREAM_REPO}" --json tagName,url)"
          else
            upstream_json="$(gh release view --repo "${UPSTREAM_REPO}" --json tagName,url)"
          fi

          upstream_tag="$(jq -r '.tagName' <<< "${upstream_json}")"
          upstream_url="$(jq -r '.url' <<< "${upstream_json}")"
          version="${upstream_tag#v}"

          if [[ -z "${upstream_tag}" || "${upstream_tag}" == "null" ]]; then
            echo "Unable to resolve upstream release tag" >&2
            exit 1
          fi

          if [[ "${FORCE_RELEASE}" == "true" ]]; then
            should_build="true"
            echo "Force release requested for ${upstream_tag}; build required."
          elif gh release view "${upstream_tag}" >/dev/null 2>&1; then
            should_build="false"
            echo "Release ${upstream_tag} already exists in ${GH_REPO}."
          else
            should_build="true"
            echo "Release ${upstream_tag} is missing in ${GH_REPO}; build required."
          fi

          echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"
          echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "upstream_url=${upstream_url}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.asset_arch }}
    needs: plan
    if: needs.plan.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_arch: x64
          - runner: macos-15
            asset_arch: arm64

    steps:
      - name: Clone upstream release source
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none "${UPSTREAM_GIT_URL}" source
          git -C source checkout --detach "${{ needs.plan.outputs.upstream_tag }}"
          git -C source rev-parse HEAD

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          swift build --package-path source -c release

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.plan.outputs.version }}"
          asset="perspective-cuts-${version}-macos-${{ matrix.asset_arch }}"
          dist="${PWD}/dist/${asset}"

          mkdir -p "${dist}/bin" "${dist}/Resources" "${dist}/share/doc/perspective-cuts"
          cp "source/.build/release/perspective-cuts" "${dist}/bin/perspective-cuts"
          cp source/Sources/perspective-cuts/Resources/actions.json "${dist}/Resources/actions.json"
          cp source/LICENSE "${dist}/share/doc/perspective-cuts/LICENSE"
          cp source/README.md "${dist}/share/doc/perspective-cuts/README.md"
          chmod 0755 "${dist}/bin/perspective-cuts"

          tar -czf "${asset}.tar.gz" -C "${dist}" .
          shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: perspective-cuts-macos-${{ matrix.asset_arch }}
          path: |
            perspective-cuts-*.tar.gz
            perspective-cuts-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - plan
      - build
    if: needs.plan.outputs.should_build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums file
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          cat ./*.tar.gz.sha256 > checksums.txt
          rm ./*.tar.gz.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.plan.outputs.upstream_tag }}"
          title="perspective-cuts ${tag}"
          notes="Build-only release for ${UPSTREAM_REPO} ${tag}. Upstream release: ${{ needs.plan.outputs.upstream_url }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" artifacts/* --clobber
            gh release edit "${tag}" --target "${GITHUB_SHA}" --title "${title}" --notes "${notes}"
          else
            gh release create "${tag}" artifacts/* \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}"
          fi
